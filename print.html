<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Print Pdf</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 9.5pt;
            line-height: 1.4;
            color: #000;
            background: #fff;
            width: 210mm;
            padding: 12mm 14mm;
        }

        .rv-rule {

            border: none;
            height: 0.5px;
            background-color: #000;
            margin-top: 2px;
            margin-bottom: 4px;

        }

        .rv-header {
            border-bottom: none;
        }

        @page {
            size: A4;
            margin: 0;
        }
    </style>
</head>

<body id="print-body">
    <!-- Content injected by JS -->
</body>

</html>
